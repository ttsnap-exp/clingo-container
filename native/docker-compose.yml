services:
  clingo-native:
    build: .
    container_name: clingo-web-native
    ports:
      - "8080:8080"
    restart: unless-stopped
    # No JVM flags needed — binary uses ~3MB RAM naturally
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    security_opt:
      - no-new-privileges:true
