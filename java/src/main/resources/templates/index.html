<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clingo Web Solver</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg:        #111210;
            --surface:   #1a1b19;
            --surface2:  #222420;
            --border:    #2e302c;
            --text:      #d0d1cc;
            --muted:     #6b6d67;
            --accent:    #4f9e6f;
            --accent-h:  #3d8259;
            --error:     #c05050;
            --radius:    6px;
            --mono:      'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
        }
        html, body { height: 100%; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        header svg { color: var(--accent); flex-shrink: 0; }
        header h1 { font-size: 1.05rem; font-weight: 600; letter-spacing: 0.01em; }
        header span { font-size: 0.8rem; color: var(--muted); }
        main {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
            overflow: hidden;
        }
        .pane {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .pane + .pane { border-left: 1px solid var(--border); }
        .pane-header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0.5rem 1rem;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--muted);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        textarea {
            flex: 1;
            background: var(--bg);
            color: var(--text);
            font-family: var(--mono);
            font-size: 0.85rem;
            line-height: 1.6;
            border: none;
            outline: none;
            resize: none;
            padding: 1rem;
            tab-size: 4;
        }
        textarea:focus { background: #131511; }
        .output {
            flex: 1;
            font-family: var(--mono);
            font-size: 0.85rem;
            line-height: 1.6;
            padding: 1rem;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
            color: var(--text);
        }
        .output.empty { color: var(--muted); font-style: italic; }
        .output.has-error { color: var(--error); }
        footer {
            background: var(--surface);
            border-top: 1px solid var(--border);
            padding: 0.6rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        button[type=submit] {
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: var(--radius);
            padding: 0.45rem 1.2rem;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
        }
        button[type=submit]:hover { background: var(--accent-h); }
        button[type=submit]:active { transform: scale(0.97); }
        .hint { font-size: 0.75rem; color: var(--muted); margin-left: auto; }
        @media (max-width: 700px) {
            main { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
            .pane + .pane { border-left: none; border-top: 1px solid var(--border); }
        }
    </style>
</head>
<body>
<header>
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
    </svg>
    <h1>Clingo Web Solver</h1>
    <span>Answer Set Programming</span>
</header>

<form method="post" action="/run" style="flex:1;display:contents;">
    <main>
        <div class="pane">
            <div class="pane-header">
                <span>&#9654; Program (.lp)</span>
            </div>
            <textarea name="program" spellcheck="false" autocorrect="off" autocapitalize="off"
                      th:text="${program}"></textarea>
        </div>
        <div class="pane">
            <div class="pane-header">
                <span>&#9654; Output</span>
            </div>
            <div th:if="${result == null}" class="output empty">Noch kein Ergebnis — Programm ausführen...</div>
            <div th:if="${result != null}"
                 th:class="'output' + (${result.startsWith('ERROR')} ? ' has-error' : '')"
                 th:text="${result}"></div>
        </div>
    </main>
    <footer>
        <button type="submit">&#9654;&nbsp; Ausführen</button>
        <span class="hint">Clingo 0 &mdash; alle Antwortmengen</span>
    </footer>
</form>
</body>
</html>
